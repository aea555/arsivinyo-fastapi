user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    client_max_body_size 50M;

    upstream app_api {
        server api:8000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://app_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # NOTE: X-App-Secret is intentionally NOT forwarded for security
            # The bypass only works when hitting the API directly (port 8000)
            
            # Increase timeouts for slow pre-flight checks (e.g. Youtube)
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
        }

        # X-Accel-Redirect: Peak performance for file serving
        # The 'alias' path must match the physical path inside the nginx container
        location /_internal_downloads/ {
            internal;
            alias /app/downloads/;
        }
    }
}
