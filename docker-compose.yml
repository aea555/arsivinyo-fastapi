version: '3.8'

services:
  redis:
    image: valkey/valkey:7.2-alpine
    container_name: downloader_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    container_name: downloader_api
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - FIREBASE_SERVICE_ACCOUNT_JSON=/app/firebase-auth.json
    volumes:
      - ./downloads:/app/downloads
      - ./cookies:/app/cookies
      - ./firebase-auth.json:/app/firebase-auth.json
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    container_name: downloader_worker
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./downloads:/app/downloads
      - ./cookies:/app/cookies
    depends_on:
      - redis
    command: celery -A app.tasks worker --loglevel=info --concurrency=4

  nginx:
    image: nginx:alpine
    container_name: downloader_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./downloads:/app/downloads:ro
    depends_on:
      - api

volumes:
  redis_data:
