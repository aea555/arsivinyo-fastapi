services:
  redis:
    image: valkey/valkey:9.0-alpine3.23
    container_name: downloader_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    container_name: downloader_api
    env_file: .env
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./downloads:/app/downloads
      - ./cookies:/app/cookies
      - ./firebase-auth.json:/app/firebase-auth.json:ro,z
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    container_name: downloader_worker
    env_file: .env
    volumes:
      - ./downloads:/app/downloads
      - ./cookies:/app/cookies
    depends_on:
      - redis
    command: celery -A app.tasks worker --loglevel=info --concurrency=4 --max-tasks-per-child=10

  nginx:
    image: nginx:1.29.4-alpine-slim
    container_name: downloader_nginx
    ports:
      - "8090:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro,z
      - ./downloads:/app/downloads:ro,z
    depends_on:
      - api

volumes:
  redis_data:
