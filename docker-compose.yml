services:
  redis:
    image: valkey/valkey:9.0-alpine3.23
    container_name: downloader_redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - fastapi-network

  api:
    image: ${BACKEND_IMAGE:-arsivinyo-fastapi:local}
    build: .
    container_name: downloader_api
    env_file: .env
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./downloads:/app/downloads:z
      - ./cookies:/app/cookies:z
      - ./firebase-auth.json:/app/firebase-auth.json:ro,z
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - fastapi-network

  worker:
    image: ${BACKEND_IMAGE:-arsivinyo-fastapi:local}
    build: .
    container_name: downloader_worker
    env_file: .env
    volumes:
      - ./downloads:/app/downloads:z
      - ./cookies:/app/cookies:z
    depends_on:
      - redis
    command: celery -A app.tasks worker --loglevel=info --concurrency=2 --max-tasks-per-child=5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - fastapi-network

  nginx:
    image: nginx:1.29.4-alpine-slim
    container_name: downloader_nginx
    ports:
      - "127.0.0.1:${PORT:-8090}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro,z
      - ./downloads:/app/downloads:ro,z
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - fastapi-network
      - shared-services

volumes:
  redis_data:

networks:
  fastapi-network:
    driver: bridge
  shared-services:
    external: true
    name: ${SHARED_SERVICES_NETWORK:-arsivinyo-shared}
