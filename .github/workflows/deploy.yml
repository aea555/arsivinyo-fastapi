name: Deploy to VPS

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image tags
        id: image
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/arsivinyo-fastapi:dev-${GITHUB_SHA}"
          latest="ghcr.io/${owner}/arsivinyo-fastapi:dev-latest"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.image }}
            ${{ steps.image.outputs.latest }}
          cache-from: type=gha,scope=arsivinyo-fastapi
          cache-to: type=gha,mode=max,scope=arsivinyo-fastapi

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    env:
      TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
    steps:
      - name: Connect to Tailscale (optional)
        if: ${{ env.TS_AUTHKEY != '' }}
        continue-on-error: true
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ env.TS_AUTHKEY }}

      - name: Select SSH host (Tailscale first)
        id: ssh_host
        env:
          TS_SSH_HOST: ${{ secrets.TS_SSH_HOST }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: "2558"
        run: |
          set -euo pipefail
          can_reach() {
            local host="$1"
            [ -n "$host" ] || return 1
            timeout 5 bash -c "cat < /dev/null > /dev/tcp/${host}/${SSH_PORT}" >/dev/null 2>&1
          }

          if can_reach "${TS_SSH_HOST}"; then
            SELECTED_HOST="${TS_SSH_HOST}"
            SELECTED_PATH="tailscale"
          elif can_reach "${SSH_HOST}"; then
            SELECTED_HOST="${SSH_HOST}"
            SELECTED_PATH="direct"
          else
            echo "Neither TS_SSH_HOST nor SSH_HOST is reachable on port ${SSH_PORT}."
            exit 1
          fi

          echo "host=${SELECTED_HOST}" >> "$GITHUB_OUTPUT"
          echo "path=${SELECTED_PATH}" >> "$GITHUB_OUTPUT"
          echo "Using ${SELECTED_PATH} SSH path: ${SELECTED_HOST}:${SSH_PORT}"

      - name: Execute remote deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          BACKEND_IMAGE: ${{ needs.build_and_push.outputs.image }}
        with:
          host: ${{ steps.ssh_host.outputs.host }}
          port: 2558
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: BACKEND_IMAGE
          command_timeout: 45m
          script: |
            set -euo pipefail
            cd ~/arsivinyo-fastapi/

            DOCKER_BIN="$(command -v docker || true)"
            [ -n "${DOCKER_BIN}" ] || { echo "docker command not found on target host"; exit 1; }
            if ! "${DOCKER_BIN}" info >/dev/null 2>&1; then
              if sudo -n "${DOCKER_BIN}" info >/dev/null 2>&1; then
                docker() { sudo -n "${DOCKER_BIN}" "$@"; }
              else
                echo "No permission to access docker daemon (try adding user to docker group)."
                id || true
                groups || true
                ls -l /var/run/docker.sock || true
                exit 1
              fi
            fi

            git fetch origin
            git checkout -f dev || git checkout -b dev origin/dev
            git reset --hard origin/dev

            touch .env
            if grep -qE '^BACKEND_IMAGE=' .env; then
              sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${BACKEND_IMAGE}|" .env
            else
              printf '\nBACKEND_IMAGE=%s\n' "${BACKEND_IMAGE}" >> .env
            fi

            SHARED_NETWORK="$(grep -E '^SHARED_SERVICES_NETWORK=' .env 2>/dev/null | tail -n1 | cut -d= -f2- || true)"
            SHARED_NETWORK="${SHARED_NETWORK:-arsivinyo-shared}"
            docker network inspect "${SHARED_NETWORK}" >/dev/null 2>&1 || docker network create "${SHARED_NETWORK}"

            if ! docker pull "${BACKEND_IMAGE}"; then
              echo "Initial image pull failed. Retrying once after optional docker daemon restart..."
              docker system df || true
              if command -v systemctl >/dev/null 2>&1; then
                sudo -n systemctl restart docker || true
                sleep 5
              fi
              docker pull "${BACKEND_IMAGE}" || exit 1
            fi

            docker compose up -d --no-build --remove-orphans
            docker compose restart nginx || true
            sleep 10
            docker compose ps api worker nginx

      - name: Disconnect Tailscale
        if: ${{ always() && env.TS_AUTHKEY != '' }}
        run: |
          set +e
          if command -v tailscale >/dev/null 2>&1; then
            sudo tailscale down || true
            sudo tailscale logout || true
          fi
